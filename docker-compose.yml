version: '3.8'

services:
  improved_aiv_editor:
    build: .
    container_name: improved_aiv_editor
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
    volumes:
      - ./src:/app/src
      - ./.env:/app/.env
    restart: unless-stopped
    networks:
      - default
      - s3-network

networks:
  s3-network:
    external: true
